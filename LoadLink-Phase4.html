<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoadLink — The Future of UK Transport</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Satoshi:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080f;--bg2:#0b0f1a;--bg3:#111827;--s1:rgba(255,255,255,0.03);--s2:rgba(255,255,255,0.06);--s3:rgba(255,255,255,0.09);--gl:rgba(255,255,255,0.04);--gb:rgba(255,255,255,0.08);--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--am:#f59e0b;--am2:#fbbf24;--ag:rgba(245,158,11,0.15);--bl:#3b82f6;--bl2:#60a5fa;--bg2b:rgba(59,130,246,0.15);--gn:#22c55e;--gn2:#4ade80;--gg:rgba(34,197,94,0.15);--pp:#8b5cf6;--pp2:#a78bfa;--pg:rgba(139,92,246,0.15);--rd:#ef4444;--rd2:#f87171;--r:16px;--rl:24px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Satoshi','DM Sans',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--am);color:var(--bg)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;font-family:inherit}input,select,textarea{font-family:inherit;outline:none}
.mono{font-family:'JetBrains Mono',monospace}.serif{font-family:'Instrument Serif',serif}.hidden{display:none!important}
body::before{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(120px);z-index:0}
.orb-1{top:-10%;left:-10%;width:500px;height:500px;background:rgba(245,158,11,0.06);animation:of 20s ease-in-out infinite}
.orb-2{bottom:-10%;right:-10%;width:600px;height:600px;background:rgba(59,130,246,0.05);animation:of 25s ease-in-out infinite reverse}
.orb-3{top:40%;left:60%;width:400px;height:400px;background:rgba(139,92,246,0.04);animation:of 30s ease-in-out infinite}
@keyframes of{0%,100%{transform:translate(0,0)}25%{transform:translate(30px,-20px)}50%{transform:translate(-20px,30px)}75%{transform:translate(25px,15px)}}
.glass{background:var(--gl);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--gb);border-radius:var(--rl);transition:all .4s cubic-bezier(.16,1,.3,1)}
.glass:hover{border-color:rgba(255,255,255,0.12);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
nav{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 32px);max-width:720px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,8,15,0.75);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.06);border-radius:50px}
.nav-brand{display:flex;align-items:center;gap:8px;background:none;color:#fff}
.nav-logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#f59e0b,#ea580c);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:11px;box-shadow:0 4px 12px rgba(245,158,11,0.3)}
.nav-name{font-size:16px;font-weight:900;letter-spacing:-.5px}
.nav-right{display:flex;align-items:center;gap:6px}
.nav-tag{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:700}
.nav-tag.biz{background:var(--ag);color:var(--am2)}.nav-tag.drv{background:var(--bg2b);color:var(--bl2)}
.notif-btn{position:relative;background:var(--s1);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);transition:.2s}.notif-btn:hover{background:var(--s2)}
.notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--rd);border-radius:50%;border:2px solid var(--bg);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
.nav-home{font-size:10px;color:var(--t3);background:var(--s1);padding:6px 12px;border-radius:20px;font-weight:600;transition:.2s}.nav-home:hover{color:var(--t1);background:var(--s2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;padding:12px 20px;border-radius:50px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#065f46,#047857);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3);box-shadow:0 16px 40px rgba(5,150,105,0.2);animation:ti .4s cubic-bezier(.16,1,.3,1)}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.container{max-width:720px;margin:0 auto;padding:0 16px}
.btn{padding:12px 24px;border-radius:var(--r);font-size:13px;font-weight:700;transition:all .3s cubic-bezier(.16,1,.3,1);letter-spacing:-.2px;display:inline-flex;align-items:center;gap:6px;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0) scale(.98)}
.btn-am{background:linear-gradient(135deg,#f59e0b,#ea580c);color:#fff;box-shadow:0 8px 24px rgba(245,158,11,0.25)}
.btn-bl{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 8px 24px rgba(59,130,246,0.25)}
.btn-gn{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 8px 24px rgba(34,197,94,0.2)}
.btn-pp{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;box-shadow:0 8px 24px rgba(139,92,246,0.25)}
.btn-gh{background:var(--s2);color:var(--t2);border:1px solid var(--gb)}.btn-gh:hover{color:var(--t1);background:var(--s3)}
.btn-row{display:flex;gap:8px;margin-top:14px}.btn-row .btn{flex:1;justify-content:center}
.btn-sm{padding:8px 14px;font-size:11px;border-radius:12px;font-weight:700}.btn-full{width:100%;justify-content:center}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700}
.badge-am{background:var(--ag);color:var(--am2);border:1px solid rgba(245,158,11,0.2)}
.badge-bl{background:var(--bg2b);color:var(--bl2);border:1px solid rgba(59,130,246,0.2)}
.badge-gn{background:var(--gg);color:var(--gn2);border:1px solid rgba(34,197,94,0.2)}
.badge-rd{background:rgba(239,68,68,0.1);color:var(--rd2);border:1px solid rgba(239,68,68,0.2)}
.badge-pp{background:var(--pg);color:var(--pp2);border:1px solid rgba(139,92,246,0.2)}
.badge-gold{background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(234,88,12,0.15));color:#fcd34d;border:1px solid rgba(245,158,11,0.3)}
.badge-silver{background:rgba(148,163,184,0.1);color:#cbd5e1;border:1px solid rgba(148,163,184,0.2)}
.badge-bronze{background:rgba(249,115,22,0.1);color:#fdba74;border:1px solid rgba(249,115,22,0.2)}
.form-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--gb);background:var(--s1);color:var(--t1);font-size:14px;transition:.3s}
.form-input:focus{border-color:var(--am);box-shadow:0 0 0 3px var(--ag)}.form-input::placeholder{color:var(--t3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;position:relative;z-index:1}
.home-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:50px;font-size:11px;font-weight:600;margin-bottom:32px;animation:fd .6s ease;background:var(--s2);border:1px solid var(--gb);color:var(--t2)}
.home-pill-dot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:p 2s infinite}
@keyframes fd{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.home h1{font-size:clamp(40px,7vw,74px);font-weight:900;line-height:1.05;letter-spacing:-3px;margin-bottom:20px;animation:fu .7s ease .1s both}
.home h1 .grad{background:linear-gradient(135deg,#f59e0b 0%,#ef4444 50%,#8b5cf6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:gs 8s ease infinite}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.home-sub{font-size:clamp(15px,2vw,18px);color:var(--t2);max-width:440px;line-height:1.7;margin-bottom:40px;animation:fu .7s ease .2s both}
.home-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:520px;margin:48px auto 0;animation:fu .7s ease .3s both}
.hcard{position:relative;padding:28px 22px;text-align:left;overflow:hidden;transition:all .4s cubic-bezier(.16,1,.3,1);color:#fff;border-radius:24px}
.hcard:hover{transform:translateY(-4px) scale(1.01)}
.hcard.biz{background:linear-gradient(160deg,#b45309,#ea580c,#f59e0b);box-shadow:0 20px 50px rgba(245,158,11,0.15)}
.hcard.drv{background:linear-gradient(160deg,#1e40af,#2563eb,#3b82f6);box-shadow:0 20px 50px rgba(37,99,235,0.15)}
.hcard::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.3));pointer-events:none}
.hcard-emoji{font-size:36px;margin-bottom:12px;display:block;position:relative;z-index:1}
.hcard h2{font-size:18px;font-weight:900;margin-bottom:6px;letter-spacing:-.5px;position:relative;z-index:1}
.hcard p{font-size:12px;opacity:.75;line-height:1.6;position:relative;z-index:1}
.hcard-arrow{margin-top:16px;font-size:12px;font-weight:700;opacity:.9;display:flex;align-items:center;gap:4px;position:relative;z-index:1;transition:.2s}
.hcard:hover .hcard-arrow{gap:8px}
.sec-t{font-size:22px;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
.sec-s{font-size:13px;color:var(--t3);margin-bottom:16px}
.drv-header{background:linear-gradient(160deg,#1e1b4b,#312e81,#3730a3);padding:20px 16px;position:relative;overflow:hidden}
.drv-header::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(139,92,246,0.2),transparent);pointer-events:none}
.drv-inner{max-width:720px;margin:0 auto;position:relative;z-index:1}
.drv-top{display:flex;align-items:center;justify-content:space-between}
.drv-stats{display:flex;gap:20px;text-align:center}
.drv-stat-n{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace}
.drv-stat-l{font-size:10px;color:#93c5fd;margin-top:1px}
.tabs{background:rgba(6,8,15,0.9);backdrop-filter:blur(20px);position:sticky;top:54px;z-index:40;border-bottom:1px solid var(--gb);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs-row{display:flex;max-width:720px;margin:0 auto;gap:2px;padding:6px 8px}
.tab{flex:none;padding:8px 10px;font-size:10px;font-weight:600;text-align:center;border-radius:10px;color:var(--t3);background:none;transition:.25s;white-space:nowrap}
.tab:hover{color:var(--t2);background:var(--s1)}.tab.active{color:var(--t1);background:var(--s2);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.tab-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--pp);margin-left:2px;vertical-align:middle}
.tab-ct{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;font-size:9px;font-weight:700;margin-left:3px;padding:0 4px}
.tab.active .tab-ct{background:var(--bl);color:#fff}.tab:not(.active) .tab-ct{background:var(--s2);color:var(--t3)}
.steps-bar{background:rgba(6,8,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--gb);padding:12px 16px;position:sticky;top:54px;z-index:40}
.steps-row{display:flex;align-items:center;gap:6px;max-width:600px;margin:0 auto}
.step-n{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step-n.on{background:linear-gradient(135deg,#f59e0b,#ea580c);color:#fff;box-shadow:0 4px 12px rgba(245,158,11,0.3)}
.step-n.off{background:var(--s2);color:var(--t3)}
.step-lbl{font-size:11px;font-weight:600}.step-lbl.on{color:var(--t1)}.step-lbl.off{color:var(--t3)}
.step-line{flex:1;height:2px;border-radius:1px}.step-line.on{background:var(--am)}.step-line.off{background:var(--s2)}
.ai-box{position:relative;border-radius:var(--rl);padding:20px;margin-bottom:14px;overflow:hidden;background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(59,130,246,0.06));border:1px solid rgba(139,92,246,0.15)}
.ai-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);color:#fff;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;box-shadow:0 4px 12px rgba(139,92,246,0.3)}
.lcard{border-radius:var(--rl);overflow:hidden;margin-bottom:12px;transition:all .3s cubic-bezier(.16,1,.3,1);background:var(--gl);border:1px solid var(--gb)}
.lcard:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.12)}
.lcard-body{padding:16px}
.lcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lcard-actions{padding:10px 16px;background:rgba(255,255,255,0.02);border-top:1px solid var(--gb);display:flex;gap:8px}
.ai-score{padding:4px 8px;border-radius:8px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.ai-reason{background:rgba(139,92,246,0.06);border:1px solid rgba(139,92,246,0.1);border-radius:10px;padding:8px 10px;font-size:11px;color:var(--pp2);margin-top:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-val{font-size:26px;font-weight:900;font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:11px;margin-top:3px;opacity:.7}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:140px}
.chart-bar{flex:1;border-radius:8px 8px 0 0;transition:height .8s cubic-bezier(.16,1,.3,1);position:relative;min-width:0}
.chart-bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--t2);white-space:nowrap;font-family:'JetBrains Mono',monospace}
.chart-bar-lbl{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--t3);white-space:nowrap}
.track-map{background:linear-gradient(160deg,#0c1929,#0f1d32,#0a1628);border-radius:var(--rl);border:1px solid var(--gb);height:220px;position:relative;overflow:hidden;margin-bottom:14px}
.track-route{position:absolute;top:50%;left:12%;right:12%;height:3px;background:rgba(59,130,246,0.15);border-radius:2px;transform:translateY(-50%)}
.track-route-done{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--bl),var(--bl2));border-radius:2px;box-shadow:0 0 12px rgba(59,130,246,0.4)}
.track-pin{position:absolute;top:50%;transform:translate(-50%,-100%);font-size:22px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))}
.track-pin-a{left:12%}.track-pin-b{left:88%}
.track-van{position:absolute;top:50%;transform:translate(-50%,-130%);font-size:28px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))}
.track-eta{position:absolute;top:12px;right:12px;background:rgba(6,8,15,0.8);backdrop-filter:blur(20px);color:var(--bl2);padding:6px 14px;border-radius:12px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;border:1px solid rgba(59,130,246,0.2)}
.track-label{position:absolute;bottom:12px;font-size:10px;font-weight:600;background:rgba(6,8,15,0.8);padding:4px 10px;border-radius:8px;backdrop-filter:blur(10px);border:1px solid var(--gb)}
.track-label-a{left:8%}.track-label-b{right:8%}
.track-steps{display:flex;gap:4px;margin-bottom:14px}
.track-step{flex:1;text-align:center;padding:10px 4px;border-radius:12px;font-size:10px;font-weight:700}
.track-step.done{background:var(--gg);color:var(--gn2);border:1px solid rgba(34,197,94,0.15)}
.track-step.current{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,0.3)}
.track-step.pending{background:var(--s1);color:var(--t3);border:1px solid var(--gb)}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heat-cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:rgba(255,255,255,0.6);transition:.2s}
.heat-cell:hover{transform:scale(1.2);z-index:1}
.tier-card{border-radius:var(--rl);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.tier-card.gold{background:linear-gradient(160deg,rgba(245,158,11,0.15),rgba(234,88,12,0.1));border:1px solid rgba(245,158,11,0.25)}
.tier-card.silver{background:linear-gradient(160deg,rgba(148,163,184,0.1),rgba(100,116,139,0.05));border:1px solid rgba(148,163,184,0.15)}
.tier-card.bronze{background:linear-gradient(160deg,rgba(249,115,22,0.1),rgba(234,88,12,0.05));border:1px solid rgba(249,115,22,0.15)}
.lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--gb);transition:.2s}.lb-row:hover{background:var(--s1)}
.lb-rank{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0}
.lb-av{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.lb-bar{height:5px;border-radius:3px;background:var(--s2);flex:1;max-width:100px;overflow:hidden}
.lb-bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.reward-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--r);background:var(--s1);border:1px solid var(--gb);margin-bottom:8px;transition:.2s}.reward-item:hover{background:var(--s2)}
.reward-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.doc-row{display:flex;align-items:center;justify-content:space-between;padding:14px;border-radius:var(--r);background:var(--s1);border:1px solid var(--gb);margin-bottom:8px;transition:.2s}.doc-row:hover{background:var(--s2)}
.fleet-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--r);background:var(--s1);border:1px solid var(--gb);margin-bottom:8px;transition:.2s}.fleet-row:hover{background:var(--s2)}
.msg-item{display:flex;gap:10px;padding:14px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:.2s}.msg-item:hover{background:var(--s1)}.msg-item.unread{background:rgba(59,130,246,0.04)}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;margin-bottom:6px}
.msg-out{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border-bottom-right-radius:4px;margin-left:auto}
.msg-in{background:var(--s2);color:var(--t1);border-bottom-left-radius:4px}
.pay-hero{background:linear-gradient(160deg,#1e1b4b,#312e81);border-radius:24px;padding:24px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.pay-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(139,92,246,0.2),transparent);pointer-events:none}
